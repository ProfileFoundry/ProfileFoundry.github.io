document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

idth: 1208px; height: 72px; border-radius: 9px; background: linear-gradient(90deg,#fbf1f6,#f9eef3); border: 1px solid #ecd7e2; display: flex; align-items: center; padding: 0 20px; gap: 18px\">\n        <div style=\"display:flex;align-items:baseline;gap:9px;flex-shrink:0;\"><span style=\"font:600 12px 'IBM Plex Mono',monospace;color:#a8487f;\">N7<\u002Fspan><span style=\"font:600 20px 'Helvetica Neue',Arial;color:#2c2c34;\">Export + audit<\u002Fspan><\u002Fdiv>\n        <div style=\"width:1px;height:30px;background:#e6cdd9;\"><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n          <span style=\"font:500 13px 'IBM Plex Mono',monospace;color:#8e3a6c;background:#f5e3ec;border-radius:5px;padding:4px 9px;\">JSONL / parquet<\u002Fspan>\n          <span style=\"font:500 13px 'IBM Plex Mono',monospace;color:#8e3a6c;background:#f5e3ec;border-radius:5px;padding:4px 9px;\">replay<\u002Fspan>\n          <span style=\"font:500 13px 'IBM Plex Mono',monospace;color:#8e3a6c;background:#f5e3ec;border-radius:5px;padding:4px 9px;\">FK closure<\u002Fspan>\n          <span style=\"font:500 13px 'IBM Plex Mono',monospace;color:#8e3a6c;background:#f5e3ec;border-radius:5px;padding:4px 9px;\">cross-field quality<\u002Fspan>\n          <span style=\"font:500 13px 'IBM Plex Mono',monospace;color:#8e3a6c;background:#f5e3ec;border-radius:5px;padding:4px 9px;\">leakage screens<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- source map -->\n    <div style=\"display:flex;flex-wrap:wrap;gap:5px 22px;border-top:1px solid #e6eaef;margin-top:18px;padding-top:14px;font:400 13px 'IBM Plex Mono',monospace;color:#6a727e;\">\n      <span><span style=\"color:#2f8079;\">N2<\u002Fspan> linkage/households.py<\u002Fspan>\n      <span><span style=\"color:#2f8079;\">N3<\u002Fspan> generate/factory.py<\u002Fspan>\n      <span><span style=\"color:#3f7d4f;\">N4<\u002Fspan> generate/{education_status,occupation,finance_health,contact_ids}.py<\u002Fspan>\n #6a727e;margin-bottom:2px;padding:0 4px;\"><span>8 household types · per 100 hh<\u002Fspan><span>6 role slots → 227.9 people<\u002Fspan><\u002Fdiv>\n        <svg viewBox=\"0 0 800 600\" style=\"width:100%;height:auto;display:block;\">\n          <sc-for list=\"{{ C.ribbons }}\" as=\"r\" hint-placeholder-count=\"18\"><path d=\"{{ r.d }}\" fill=\"{{ r.fill }}\" opacity=\"{{ r.op }}\"><\u002Fpath><\u002Fsc-for>\n          <sc-for list=\"{{ C.comps }}\" as=\"c\" hint-placeholder-count=\"8\"><rect x=\"{{ c.x }}\" y=\"{{ c.y }}\" width=\"{{ c.w }}\" height=\"{{ c.h }}\" rx=\"3\" fill=\"{{ c.fill }}\"><\u002Frect><\u002Fsc-for>\n          <sc-for list=\"{{ C.roles }}\" as=\"r\" hint-placeholder-count=\"6\"><rect x=\"{{ r.x }}\" y=\"{{ r.y }}\" width=\"{{ r.w }}\" height=\"{{ r.h }}\" rx=\"3\" fill=\"#3c3c46\"><\u002Frect><\u002Fsc-for>{{ C.labels }}\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;border-left:1px solid #e6eaef;padding-left:24px;\">\n        <div style=\"font:600 14px 'Helvetica Neue',Arial;letter-spacing:.14em;text-transform:uppercase;color:#a8503a;margin-bottom:14px;\">Graph closure — family edges<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;margin-bottom:22px;\">\n          <div style=\"display:flex;gap:10px;align-items:baseline;\"><span style=\"font:600 16px 'IBM Plex Mono',monospace;color:#a8503a;width:46px;flex-shrink:0;\">⇄<\u002Fspan><div style=\"font:500 15px/1.35 'Helvetica Neue',Arial;color:#3c3c46;\"><b style=\"font-weight:600;\">head ⇄ spouse<\u002Fb> — mutual spouse edge<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:baseline;\"><span style=\"font:600 16px 'IBM Plex Mono',monospace;color:#a8503a;width:46px;flex-shrink:0;\">→<\u002Fspan><div style=\"font:500 15px/1.35 'Helvetica Neue',Arial;color:#3c3c46;\"><b style=\"font-weight:600;\">parents → children<\u002Fb> — head &amp; spouse to every adult-child slot<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:baseline;\"><span style=\"font:600 16px 'IBM Plex Mono',monospace;color:#a8503a;width:46px;flex-shrink:0;\">↔<\u002Fspan><div style=\"font:500 15px/1.35 'Helvetica Neue',Arial;color:#3c3c46;\"><b style=\"font-weight:600;\">child ↔ child<\u002Fb> — sibling edges among adult children<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:baseline;\"><span style=\"font:600 16px 'IBM Plex Mono',monospace;color:#a8503a;width:46px;flex-shrink:0;\">→<\u002Fspan><div style=\"font:500 15px/1.35 'Helvetica Neue',Arial;color:#3c3c46;\"><b style=\"font-weight:600;\">grandparent → head<\u002Fb> — children edge<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:baseline;\"><span style=\"font:600 13px 'IBM Plex Mono',monospace;color:#6e7682;width:46px;flex-shrink:0;border:1px dashed #bcc2cb;border-radius:4px;text-align:center;padding:1px 0;color:#a8487f;\">ext<\u002Fspan><div style=\"font:500 15px/1.35 'Helvetica Neue',Arial;color:#3c3c46;\">no represented spouse + Married/Cohabiting → <b style=\"font-weight:600;color:#a8487f;\">spouse = external<\u002Fb><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:baseline;\"><span style=\"font:600 16px 'IBM Plex Mono',monospace;color:#a4abb5;width:46px;flex-shrink:0;\">∅<\u002Fspan><div style=\"font:500 15px/1.35 'Helvetica Neue',Arial;color:#7b8492;\">roommate — no family edge by role<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:600 14px 'Helvetica Neue',Arial;letter-spacing:.14em;text-transform:uppercase;color:#2f8079;margin-bottom:12px;\">Shared household facts<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;font:500 14px/1.35 'Helvetica Neue',Arial;color:#3c3c46;\">\n          <div>· Shared home phone synced across co-residents<\u002Fdiv>\n          <div>· Emergency contact priority <span style=\"font-family:'IBM Plex Mono',monospace;color:#5a6472;\">spouse › parent › sibli        <div style=\"font:400 11.5px/1.4 'IBM Plex Mono',monospace;color:#6e7682;margin-top:10px;\">move events may include birth-place moves, so minimum move age can be 0.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:400 14px/1.6 'Helvetica Neue',Arial;color:#6b7280;margin:13px 0 0;max-width:980px;\">Temporal release surface. Typed events project into address and employment histories: every address row carries source event IDs, every profile has one current address, and no event predates date of birth. The timeline is an auditable part of the object, not decoration.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== audit ===== -->\n  <section class=\"pf-sec\" id=\"audit\" style=\"border-top:1px solid #e6e5e0;max-width:1160px;margin:0 auto;padding:44px 40px 64px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#8b8e96;margin-bottom:14px;\">Evidence, reported separately<\u002Fdiv>\n    <h2 style=\"font-size:34px;line-height:1.1;letter-spacing:-0.025em;font-weight:700;margin:0 0 16px;color:#0f1115;max-width:40ch;\">Distinct evidence classes — never collapsed into one score.<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.62;color:#5b5e66;margin:0 0 44px;max-width:62ch;\">Population fit, per-object invariants, referential and temporal closure, and coincidence screens answer different questions. We report each on its own — including where the release misses a target.<\u002Fp>\n\n    <div style=\"margin-bottom:24px;\">\n      <!-- closure checklist -->\n      <div style=\"background:#fff;border:1px solid #e6e5e0;border-radius:12px;padding:28px 30px;\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#2f9e44;\"><\u002Fspan><div style=\"font-size:15px;font-weight:600;color:#16181d;letter-spacing:-0.01em;\">Referential &amp; temporal closure<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#8b8e96;margin-bottom:20px;\">full 100K normalized release<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px 30px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"color:#2f9e44;font-weight:700;font-size:14px;flex:none;\">✓<\u002Fspan><span style=\"font-size:13px;color:#3a3d44;flex:1;\">Relationship endpoints missing<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#16181d;font-weight:500;\">0<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"color:#2f9e44;font-weight:700;font-size:14px;flex:none;\">✓<\u002Fspan><span style=\"font-size:13px;color:#3a3d44;flex:1;\">Employer foreign keys missing<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#16181d;font-weight:500;\">0<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"color:#2f9e44;font-weight:700;font-size:14px;flex:none;\">✓<\u002Fspan><span style=\"font-size:13px;color:#3a3d44;flex:1;\">Household members sum<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#16181d;font-weight:500;\">100,000<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"color:#2f9e44;font-weight:700;font-size:14px;flex:none;\">✓<\u002Fspan><span style=\"font-size:13px;color:#3a3d44;flex:1;\">Spouse links mutual<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#16181d;font-weight:500;\">49,072 / 49,072<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"color:#2f9e44;font-weight:700;font-size:14px;flex:none;\">✓<\u002Fspan><span style=\"font-size:13px;color:#3a3d44;flex:1;\">Address rows with source IDs<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#16181d;font-weight:500;\">167,089 / 167,089<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"color:#2f9e44;font-weight:700;font-size:14px;flex:none;\">✓<\u002Fspan><span style=\"font-size:13px;color:#3a3d44;flex:1;\">Events predating date of birth<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#16181d;font-weight:500;\">0<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"color:#2f9e44;font-weight:700;font-size:14px;flex:none;\">✓<\u002Fspan><span style=\"font-size:13px;color:#3a3d44;flex:1;\">Declared-consistency pass (5 locales)<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#16181d;font-weight:500;\">90,000 / 90,000<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- leakage audit explained -->\n    <div style=\"background:#fff;border:1px solid #e6e5e0;border-radius:12px;padding:28px 30px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#d6457f;\"><\u002Fspan><div style=\"font-size:15px;font-weight:600;color:#16181d;letter-spacing:-0.01em;\">What the leakage &amp; collision audit checks<\u002Fdiv><\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#8b8e96;margin-bottom:24px;\">screened separately from privacy — coincidence evidence, not a privacy guarantee<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:28px;\">\n        <div style=\"border-top:2px solid #d6457f;padding-top:14px;\">\n          <h4 style=\"font-size:14px;font-weight:600;color:#16181d;margin:0 0 8px;letter-spacing:-0.01em;\">Within-release collisions<\u002Fh4>\n          <p style=\"font-size:13px;line-height:1.58;color:#5b5e66;margin:0;\">Exact-match scans for two synthetic people sharing a <b style=\"color:#16181d;font-weight:600;\">name + date of birth<\u002Fb> or <b style=\"color:#16181d;font-weight:600;\">name + birth-city<\u002Fb>, plus personal-email self-collisions. Birth-city repeats exceed name+DOB because city is lower-cardinality — these are coincidences <i>inside<\u002Fi> the release, not matches to real people.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:2px solid #a8503a;padding-top:14px;\">\n          <h4 style=\"font-size:14px;font-weight:600;color:#16181d;margin:0 0 8px;letter-spacing:-0.01em;\">Notable-person screen<\u002Fh4>\n          <p style=\"font-size:13px;line-height:1.58;color:#5b5e66;margin:0;\">Each profile is tested against a <b style=\"color:#16181d;font-weight:600;\">Bloom filter of 683,897 real humans<\u002Fb> (known birth date, ≥5 Wikidata sitelinks), keyed on <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;\">name|birth_year<\u002Fspan> and <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;\">name|birth_city<\u002Fspan> at a 10⁻⁴ false-positive rate. A flag is a <i>possible<\u002Fi> coincidence — the filter can over-report — never proof a real person was reproduced.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:2px solid #3f7d4f;padding-top:14px;\">\n          <h4 style=\"font-size:14px;font-weight:600;color:#16181d;margin:0 0 8px;letter-spacing:-0.01em;\">Reserved-domain email<\u002Fh4>\n          <p style=\"font-size:13px;line-height:1.58;color:#5b5e66;margin:0;\">Every address uses a reserved <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#d2562e;\">*.profilefoundry.example<\u002Fspan> domain (RFC 2606), so email is checked for <b style=\"color:#16181d;font-weight:600;\">syntax and uniqueness only<\u002Fb> — it can never route to a real inbox.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:22px;padding-top:18px;border-top:1px solid #eeede9;font-size:13px;line-height:1.55;color:#5b5e66;\">Per-screen counts — 7 name+DOB, 1,038 name+birth-city, 0 email, 342 Bloom flags — are charted in the figure below.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"font-size:13px;line-height:1.55;color:#8b8e96;margin:18px 0 36px;max-width:74ch;font-style:italic;\">Internal consistency, distributional fit, coincidence screening, and formal privacy remain separate forms of evidence. The release is a source substrate — not a population-fidelity model or a formal-privacy mechanism.<\u002Fp>\n\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#8b8e96;margin:52px 0 18px;\">Validation &amp; screening figures<\u002Fdiv>\n      <div style=\"margin:0 auto 34px;\">\n        <div class=\"fig-fit\" style=\"position:relative;width:100%;overflow:hidden;\">\n          <div class=\"fig-inner\" data-w=\"1208\" style=\"width:1208px;transform-origin:top left;\">\n\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid #e6eaef;padding-bottom:14px;margin-bottom:20px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;\"><span style=\"font:600 25px 'Helvetica Neue',Arial;color:#2c2c34;letter-spacing:-0.01em;\">Validation: honest misses, invariant pass<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"figO\" style=\"width:1208px;display:flex;gap:30px;\">\n      <div style=\"flex:1.4;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;\"><span style=\"font:600 12px 'Helvetica Neue',Arial;letter-spacing:.12em;text-transform:uppercase;color:#6a727e;\">Distributional gap · lower is better<\u002Fspan><span style=\"font:500 12px 'IBM Plex Mono',monospace;color:#6e7682;\">90,000 profiles<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:18px;margin-bottom:16px;font:500 12px 'Helvetica Neue',Arial;color:#5a6472;\">\n          <span style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:12px;height:12px;border-radius:50%;background:#6b5aa6;\"><\u002Fspan>mean gap<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:2px;height:13px;background:#3c3c46;\"><\u002Fspan>max gap<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:0;border-left:2px dashed #a8503a;height:13px;\"><\u002Fspan>mean target ≤ 0.07<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:7px;\"><span style=\"width:0;border-left:2px dashed #d0a08c;height:13px;\"><\u002Fspan>gap target ≤ 0.10<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ O.rows }}\" as=\"r\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:15px;\">\n            <span style=\"width:30px;flex-shrink:0;font:600 14px 'IBM Plex Mono',monospace;color:#3c3c46;\">{{ r.loc }}<\u002Fspan>\n            <div style=\"flex:1;position:relative;height:8px;background:#eef1f5;border-radius:4px;\">\n              <div style=\"position:absolute;left:0;top:0;height:8px;border-radius:4px;background:#6b5aa6;opacity:.22;width:{{ r.maxX }}%;\"><\u002Fdiv>\n              <div style=\"position:absolute;top:-4px;bottom:-4px;width:0;border-left:2px dashed #a8503a;left:{{ r.t07 }}%;\"><\u002Fdiv>\n              <div style=\"position:absolute;top:-4px;bottom:-4px;width:0;border-left:2px dashed #d0a08c;left:{{ r.t10 }}%;\"><\u002Fdiv>\n              <div style=\"position:absolute;top:-3px;width:2px;height:14px;background:#3c3c46;left:{{ r.maxX }}%;\"><\u002Fdiv>\n              <div style=\"position:absolute;top:-3px;width:14px;height:14px;border-radius:50%;background:#6b5aa6;border:2px solid #fff;left:{{ r.meanX }}%;transform:translateX(-8px);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"width:54px;flex-shrink:0;text-align:right;font:600 12px 'IBM Plex Mono',monospace;color:#6b5aa6;\">{{ r.mean }}<\u002Fspan>\n            <span style=\"width:54px;flex-shrink:0;text-align:right;font:600 12px 'IBM Plex Mono',monospace;color:#3c3c46;\">{{ r.max }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"display:flex;justify-content:space-between;font:500 11.5px 'IBM Plex Mono',monospace;color:#6e7682;margin-top:2px;padding-left:43px;\"><span>0<\u002Fspan><span>0.065<\u002Fspan><span>0.13<\u002Fspan><\u002Fdiv>\n        <div style=\"font:400 12.5px/1.5 'Helvetica Neue',Arial;color:#6a727e;margin-top:14px;\">No target is tuned away: every locale's mean stays right of 0.07, and maxima cross the 0.10 per-attribute line — disclosed, not hidden.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;border-left:1px solid #e6eaef;padding-left:28px;\">\n        <div style=\"font:600 12px 'Helvetica Neue',Arial;letter-spacing:.12em;text-transform:uppercase;color:#3f7d4f;margin-bottom:16px;\">Invariant consistency · pass<\u002Fdiv>\n        <sc-for list=\"{{ O.rows }}\" as=\"r\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:15px;\">\n            <span style=\"width:30px;flex-shrink:0;font:600 14px 'IBM Plex Mono',monospace;color:#3c3c46;\">{{ r.loc }}<\u002Fspan>\n            <div style=\"flex:1;height:14px;background:#eef1f5;border-radius:4px;overflow:hidden;\"><div style=\"height:100%;width:100%;border-radius:4px;background:#3f7d4f;opacity:.8;\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"flex-shrink:0;font:600 12px 'IBM Plex Mono',monospace;color:#2f5e3b;\">100%<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"background:#f3f8f2;border:1px solid #d8e7d6;border-radius:10px;padding:15px 17px;margin-top:8px;\">\n          <div style=\"display:flex;align-items:baseline;gap:10px;\"><span style=\"font:600 32px 'IBM Plex Mono',monospace;color:#2f5e3b;\">90,000<\u002Fspan><span style=\"font:600 14px 'Helvetica Neue',Arial;color:#3f7d4f;\">/ 90,000 pass<\u002Fspan><\u002Fdiv>\n          <div style=\"font:400 12.5px/1.45 'Helvetica Neue',Arial;color:#5a8268;margin-top:5px;\">All full-validation profiles pass declared consistency invariants — structural coherence is perfect even where marginal matching is not.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:400 14px/1.6 'Helvetica Neue',Arial;color:#6b7280;margin:13px 0 0;max-width:980px;\">Distributional validation is disclosed separately from invariant consistency. All 90,000 full-validation profiles pass declared consistency checks, but the release does not tune away marginal misses: every locale stays above the locked 0.07 mean target, and IN has the largest maximum gap at 0.124.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin:0 auto 34px;\">\n        <div class=\"fig-fit\" style=\"position:relative;width:100%;overflow:hidden;\">\n          <div class=\"fig-inner\" data-w=\"1208\" style=\"width:1208px;transform-origin:top left;\">\n\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid #e6eaef;padding-bottom:14px;margin-bottom:20px;\">\n      <div style=\"display:flex;align-items:baseline;gap:14px;\"><span style=\"font:600 25px 'Helvetica Neue',Arial;color:#2c2c34;letter-spacing:-0.01em;\">Leakage &amp; collision screening<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"figQ\" style=\"width:1208px;\">\n      <div style=\"display:flex;align-items:stretch;gap:13px;margin-bottom:24px;\">\n        <sc-for list=\"{{ Q.stages }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"flex:1;border:1px solid #e2e6eb;border-radius:10px;background:#ffffff;padding:14px 16px;border-top:4px solid {{ s.color }};\">\n            <div style=\"font:600 16px 'Helvetica Neue',Arial;color:#2c2c34;margin-bottom:4px;\">{{ s.label }}<\u002Fdiv>\n            <div style=\"font:500 12px 'Helvetica Neue',Arial;color:#7b8492;\">{{ s.sub }}<\u002Fdiv>\n            <div style=\"font:600 12.5px 'IBM Plex Mono',monospace;color:{{ s.color }};margin-top:9px;\">{{ s.flag }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:26px;\">\n        <div style=\"flex:1.5;\">\n          <div style=\"font:600 12px 'Helvetica Neue',Arial;letter-spacing:.12em;text-transform:uppercase;color:#6a727e;margin-bottom:12px;\">Published screens<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 110px 90px 90px;\">\n            <div style=\"font:600 11px 'Helvetica Neue',Arial;letter-spacing:.1em;text-transform:uppercase;color:#6a727e;padding:0 10px 9px 0;\">Audit<\u002Fdiv>\n            <div style=\"font:600 11px 'Helvetica Neue',Arial;letter-spacing:.1em;text-transform:uppercase;color:#6a727e;padding:0 10px 9px;\">Mode<\u002Fdiv>\n            <div style=\"font:600 11px 'Helvetica Neue',Arial;letter-spacing:.1em;text-transform:uppercase;color:#6a727e;padding:0 10px 9px;text-align:right;\">Findings<\u002Fdiv>\n            <div style=\"font:600 11px 'Helvetica Neue',Arial;letter-spacing:.1em;text-transform:uppercase;color:#6a727e;padding:0 0 9px;text-align:right;\">Rate<\u002Fdiv>\n            <sc-for list=\"{{ Q.audits }}\" as=\"a\" hint-placeholder-count=\"6\">\n              <div style=\"border-top:1px solid #e6eaef;padding:11px 10px 11px 0;display:flex;align-items:center;gap:10px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:{{ a.color }};flex-shrink:0;\"><\u002Fspan><span style=\"font:500 13.5px 'Helvetica Neue',Arial;color:#3c3c46;\">{{ a.audit }}<\u002Fspan><\u002Fdiv>\n              <div style=\"border-top:1px solid #e6eaef;padding:11px 10px;display:flex;align-items:center;font:500 12px 'IBM Plex Mono',monospace;color:#7b8492;\">{{ a.mode }}<\u002Fdiv>\n              <div style=\"border-top:1px solid #e6eaef;padding:11px 10px;display:flex;align-items:center;justify-content:flex-end;font:600 13px 'IBM Plex Mono',monospace;color:#2c2c34;\">{{ a.findings }}<\u002Fdiv>\n              <div style=\"border-top:1px solid #e6eaef;padding:11px 0;display:flex;align-items:center;justify-content:flex-end;font:500 12.5px 'IBM Plex Mono',monospace;color:#5a6472;\">{{ a.rate }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1;border-left:1px solid #e6eaef;padding-left:24px;\">\n          <div style=\"font:600 12px 'Helvetica Neue',Arial;letter-spacing:.12em;text-transform:uppercase;color:#6a727e;margin-bottom:13px;\">Uniqueness context<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:18px;\">\n            <sc-for list=\"{{ Q.uniq }}\" as=\"u\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px dotted #dce0e7;padding-bottom:7px;\"><span style=\"font:500 13px 'Helvetica Neue',Arial;color:#5a6472;\">{{ u.k }}<\u002Fspan><span style=\"font:600 13.5px 'IBM Plex Mono',monospace;color:#2c2c34;\">{{ u.v }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border-left:3px solid #a8487f;background:#fbf1f6;border-radius:0 7px 7px 0;padding:11px 14px;font:500 12.5px/1.5 'Helvetica Neue',Arial;color:#5a6472;\">Wikidata uses a <b style=\"color:#8e3a6c;font-weight:600;\">Bloom filter<\u002Fb>, not exact leak detection. These are conservative <b style=\"color:#8e3a6c;font-weight:600;\">screened / flagged<\u002Fb> evidence — not a formal privacy guarantee.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:400 14px/1.6 'Helvetica Neue',Arial;color:#6b7280;margin:13px 0 0;max-width:980px;\">Leakage and collision screens. The release publishes exact within-release collision checks, a Wikidata Bloom notable-person screen, and reserved-domain email syntax/uniqueness evidence. Name + birth-city exceeds name + DOB because city is lower-cardinality. Conservative audit evidence, not a privacy proof.<\u002Fdiv>\n      <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== ethics ===== -->\n  <section style=\"border-top:1px solid #e6e5e0;max-width:1160px;margin:0 auto;padding:24px 40px 72px;\">\n    <div style=\"border:1px solid #e6e5e0;background:#fff;border-radius:12px;padding:32px 34px;display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:start;\">\n      <span style=\"width:12px;height:12px;border-radius:50%;background:#d2562e;margin-top:6px;\"><\u002Fspan>\n      <div>\n        <h3 style=\"font-size:18px;font-weight:600;letter-spacing:-0.01em;margin:0 0 12px;color:#16181d;\">Intended use &amp; safeguards<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.62;color:#5b5e66;margin:0 0 12px;max-width:82ch;\">The release uses reserved <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:#d2562e;\">*.profilefoundry.example<\u002Fcode> email domains (RFC 2606), excludes minors, records synthetic provenance, and publishes within-release collision and notable-person screens. These safeguards do <strong style=\"color:#16181d;\">not<\u002Fstrong> provide differential privacy, proof of non-resemblance, or authorization to use generated contact-like fields outside controlled research.<\u002Fp>\n        <p style=\"font-size:15px;line-height:1.62;color:#5b5e66;margin:0;max-width:82ch;\">Generated phone numbers, identifiers, addresses, and names must not be used to contact, authenticate, or make decisions about real people. Derived artifacts should retain the dataset card, license, and risk disclosures.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== cite + authors ===== -->\n  <section class=\"pf-sec\" id=\"cite\" style=\"border-top:1px solid #e6e5e0;background:#0f1115;color:#e9eaec;\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:84px 40px;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#7aa2ff;margin-bottom:14px;\">Cite this work<\u002Fdiv>\n        <h2 style=\"font-size:30px;line-height:1.12;letter-spacing:-0.02em;font-weight:700;margin:0 0 22px;color:#fff;\">BibTeX<\u002Fh2>\n        <div style=\"border:1px solid #262932;border-radius:10px;background:#16181d;overflow:hidden;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid #262932;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#787e8a;\">profilefoundry.bib<\u002Fspan>\n            <button onclick=\"{{ copyBib }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;color:#b6bac2;background:transparent;border:1px solid #343843;border-radius:5px;padding:4px 10px;cursor:pointer;\" style-hover=\"border-color:#2f5bea;color:#fff;\">{{ bibLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <pre style=\"margin:0;padding:20px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.7;color:#cdd0d7;overflow-x:auto;white-space:pre;\">{{ bibtex }}<\u002Fpre>\n        <\u002Fdiv>\n        <p style=\"font-size:13px;line-height:1.55;color:#82858d;margin:14px 0 0;\">arXiv ID will be added on posting — update the <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7aa2ff;\">eprint<\u002Fcode> field then.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#7aa2ff;margin-bottom:14px;\">Acknowledgements<\u002Fdiv>\n        <h2 style=\"font-size:30px;line-height:1.12;letter-spacing:-0.02em;font-weight:700;margin:0 0 22px;color:#fff;\">Built on open resources.<\u002Fh2>\n        <p style=\"font-size:15px;line-height:1.62;color:#9a9da4;margin:0;max-width:48ch;\">ProfileFoundry builds on open fake-data providers (Faker, Mimesis) at the leaf-field level, public reference marginals for locale validation, and Wikidata for the notable-person coincidence screen. Thanks to the maintainers of those resources.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== footer ===== -->\n  <footer style=\"background:#0b0c0f;border-top:1px solid #1c1e24;\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:32px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#2f5bea;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.08em;color:#82858d;\">PROFILEFOUNDRY v1.0 · seed 4321 · manifest 11d0cf58daf037b2<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:22px;\">\n        <a href=\"https://github.com/selvamsriram/ProfileFoundry\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9a9da4;text-decoration:none;\" style-hover=\"color:#fff;\">GitHub<\u002Fa>\n        <a href=\"https://pypi.org/project/profilefoundry/\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9a9da4;text-decoration:none;\" style-hover=\"color:#fff;\">PyPI<\u002Fa>\n        <a href=\"https://huggingface.co/datasets/srirxml/ProfileFoundry-Synthetic-Person-Objects\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9a9da4;text-decoration:none;\" style-hover=\"color:#fff;\">Hugging Face<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { pkgCopied: false, relCopied: false, bibCopied: false };\n\n  CONTRIBS = [\n    { num: '01', title: 'Person Object abstraction', desc: 'A versioned schema for synthetic people — snapshot fields, graph links to household, family and employer, typed events, reserved document hooks, and full generation provenance.' },\n    { num: '02', title: 'Internally consistent linked generation', desc: 'Households, relationships, addresses, and employers commit first; records and events derive from them.' },\n    { num: '03', title: 'Executable generator & SDK', desc: 'Python package, CLI, and scripts for deterministic generation, validation, export, and rebuild.' },\n    { num: '04', title: 'Audited reference release', desc: 'Ships canonical JSONL, Parquet views, flat snapshots, manifest hashes, and a dataset card.' },\n    { num: '05', title: 'Artifact-accountability protocol', desc: 'Marginal gaps, consistency, closure, and collision screens reported as distinct evidence types.' },\n  ];\n\n  componentDidMount() {\n    const fit = () => {\n      document.querySelectorAll('.cig-fit').forEach((box) => {\n        const inner = box.querySelector('.cig-inner');\n        if (inner) inner.style.transform = 'scale(' + (box.clientWidth / 1208) + ')';\n      });\n      document.querySelectorAll('.fig-fit').forEach((box) => {\n        const inner = box.querySelector('.fig-inner');\n        if (!inner) return;\n        const base = parseFloat(inner.dataset.w) || 1208;\n        const s = Math.min(1, box.clientWidth / base);\n        inner.style.transform = 'scale(' + s + ')';\n        box.style.height = (inner.offsetHeight * s) + 'px';\n      });\n      var fw = [].slice.call(document.querySelectorAll('.pf-wt-slide > div:first-child'));\n      if (fw.length) {\n        var mh = 0;\n        fw.forEach(function (w) { var ff = w.querySelector('.fig-fit'); if (ff) mh = Math.max(mh, ff.offsetHeight); });\n        fw.forEach(function (w) { w.style.flex = 'none'; w.style.height = mh + 'px'; });\n      }\n      if (this._wtUpdate) this._wtUpdate();\n    };\n    this._fit = fit;\n    fit();\n    requestAnimationFrame(fit);\n    setTimeout(fit, 200);\n    setTimeout(fit, 600);\n    window.addEventListener('resize', fit);\n    setTimeout(fit, 1200);\n    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => { fit(); setTimeout(fit, 80); });\n\n    const track = document.querySelector('.pf-wt-track');\n    const viewport = document.querySelector('.pf-wt-viewport');\n    if (track && viewport) {\n      const thumb = document.querySelector('.pf-wt-thumb');\n      const count = document.querySelector('.pf-wt-count');\n      const slides = [].slice.call(track.querySelectorAll('.pf-wt-slide'));\n      const sw = () => (slides[0] ? slides[0].getBoundingClientRect().width + 24 : viewport.clientWidth);\n      const apply = () => {\n        const vp = viewport.clientWidth;\n        const contentW = track.scrollWidth;\n        const maxOff = Math.max(0, contentW - vp);\n        const off = Math.min(this._wtIdx * sw(), maxOff);\n        track.style.transform = 'translateX(' + (-off) + 'px)';\n        if (thumb) {\n          const vis = Math.min(1, vp / Math.max(1, contentW));\n          thumb.style.width = (vis * 100) + '%';\n          thumb.style.left = (maxOff > 0 ? (off / maxOff) * (100 - vis * 100) : 0) + '%';\n        }\n        if (count) count.textContent = String(this._wtIdx + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');\n        slides.forEach((sl, i) => {\n          const active = i === this._wtIdx;\n          sl.style.transition = 'opacity .35s ease, filter .35s ease';\n          sl.style.opacity = active ? '1' : '0.55';\n          sl.style.filter = active ? 'none' : 'saturate(0.9)';\n        });\n      };\n      if (this._wtIdx == null) this._wtIdx = 0;\n      this._wtUpdate = apply;\n      const go = (dir) => { this._wtIdx = Math.max(0, Math.min(slides.length - 1, this._wtIdx + dir)); apply(); };\n      const pv = document.querySelector('.pf-wt-prev'), nx = document.querySelector('.pf-wt-next');\n      if (pv) pv.onclick = () => go(-1);\n      if (nx) nx.onclick = () => go(1);\n      let wlock = 0;\n      viewport.addEventListener('wheel', (e) => {\n        if (Math.abs(e.deltaX) > Math.abs(e.deltaY) + 2) {\n          e.preventDefault();\n          const now = Date.now();\n          if (now - wlock > 360) { wlock = now; go(e.deltaX > 0 ? 1 : -1); }\n        }\n      }, { passive: false });\n      apply();\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._ro) this._ro.disconnect();\n    if (this._fit) window.removeEventListener('resize', this._fit);\n  }\n\n  figC() {\n    const scale = 2.27, nodeW = 15, compX = 300, roleX = 556, top = 24, compGap = 6;\n    const comps = [\n      { key: 'single', name: 'single', share: '28.5% hh', total: 28.5, fill: '#5a6472' },\n      { key: 'couple_no', name: 'couple, no kids', share: '26.5% hh', total: 53.0, fill: '#2f8079' },\n      { key: 'couple_kids', name: 'couple + children', share: '19.0% hh', total: 73.15, fill: '#3f7d4f' },\n      { key: 'cohab_no', name: 'cohabiting', share: '5.0% hh', total: 10.0, fill: '#3d6fa3' },\n      { key: 'cohab_kids', name: 'cohabiting + kids', share: '3.0% hh', total: 10.8, fill: '#6b5aa6' },\n      { key: 'single_parent', name: 'single parent', share: '9.0% hh', total: 23.4, fill: '#a8503a' },\n      { key: 'multigen', name: 'multigenerational', share: '4.5% hh', total: 18.0, fill: '#b07d2b' },\n      { key: 'unrelated', name: 'unrelated adults', share: '4.5% hh', total: 11.025, fill: '#a8487f' },\n    ];\n    const roles = [\n      { key: 'head', name: 'head', count: '95.5' },\n      { key: 'spouse', name: 'spouse', count: '50.0' },\n      { key: 'adult_child', name: 'adult child', count: '60.2' },\n      { key: 'cohabiting_partner', name: 'cohab. partner', count: '8.0' },\n      { key: 'grandparent', name: 'grandparent', count: '3.2' },\n      { key: 'roommate', name: 'roommate', count: '11.0' },\n    ];\n    const roleTotals = { head: 95.5, spouse: 50.0, adult_child: 60.2, cohabiting_partner: 8.0, grandparent: 3.15, roommate: 11.025 };\n    const edgesRaw = [\n      ['single', 'head', 28.5],\n      ['couple_no', 'head', 26.5], ['couple_no', 'spouse', 26.5],\n      ['couple_kids', 'head', 19], ['couple_kids', 'spouse', 19], ['couple_kids', 'adult_child', 35.15],\n      ['cohab_no', 'head', 5], ['cohab_no', 'cohabiting_partner', 5],\n      ['cohab_kids', 'head', 3], ['cohab_kids', 'cohabiting_partner', 3], ['cohab_kids', 'adult_child', 4.8],\n      ['single_parent', 'head', 9], ['single_parent', 'adult_child', 14.4],\n      ['multigen', 'head', 4.5], ['multigen', 'spouse', 4.5], ['multigen', 'grandparent', 3.15], ['multigen', 'adult_child', 5.85],\n      ['unrelated', 'roommate', 11.025],\n    ];\n    let y = top;\n    comps.forEach(c => { c.h = c.total * scale; c.x = compX; c.y = y; c.w = nodeW; c.ny = y + c.h / 2; c.tx = compX - 12; c._off = 0; y += c.h + compGap; });\n    const compsSpan = y - compGap - top;\n    let rolesSumH = roles.reduce((s, r) => s + roleTotals[r.key] * scale, 0);\n    const roleGap = (compsSpan - rolesSumH) / (roles.length - 1);\n    let yr = top;\n    roles.forEach(r => { r.h = roleTotals[r.key] * scale; r.x = roleX; r.y = yr; r.w = nodeW; r.ny = yr + r.h / 2; r.tx = roleX + nodeW + 12; r._off = 0; yr += r.h + roleGap; });\n    const cmap = Object.fromEntries(comps.map(c => [c.key, c]));\n    const rmap = Object.fromEntries(roles.map(r => [r.key, r]));\n    const midx = (compX + nodeW + roleX) / 2;\n    const ribbons = edgesRaw.map(([ck, rk, v]) => {\n      const c = cmap[ck], r = rmap[rk], h = v * scale;\n      const sx = c.x + c.w, sy0 = c.y + c._off; c._off += h;\n      const tx = r.x, ty0 = r.y + r._off; r._off += h;\n      const sy1 = sy0 + h, ty1 = ty0 + h;\n      const d = `M${sx} ${sy0} C${midx} ${sy0} ${midx} ${ty0} ${tx} ${ty0} L${tx} ${ty1} C${midx} ${ty1} ${midx} ${sy1} ${sx} ${sy1} Z`;\n      return { d, fill: c.fill, op: 0.4 };\n    });\n    const FF = \"'Helvetica Neue',Arial\", MONO = \"'IBM Plex Mono',monospace\", re = React.createElement;\n    const lbl = [];\n    comps.forEach((c, i) => {\n      if (c.h >= 30) {\n        lbl.push(re('text', { key: 'cn' + i, x: c.tx, y: c.ny, dy: -2, textAnchor: 'end', fontFamily: FF, fontWeight: 600, fontSize: 15, fill: '#2c2c34' }, c.name));\n        lbl.push(re('text', { key: 'cs' + i, x: c.tx, y: c.ny, dy: 14, textAnchor: 'end', fontFamily: MONO, fontWeight: 500, fontSize: 12.5, fill: '#6e7682' }, c.share));\n      } else {\n        lbl.push(re('text', { key: 'cn' + i, x: c.tx, y: c.ny, dy: 5, textAnchor: 'end', fontFamily: FF, fontWeight: 600, fontSize: 15, fill: '#2c2c34' }, [\n          re('tspan', { key: 'a' }, c.name),\n          re('tspan', { key: 'b', dx: 8, fontFamily: MONO, fontWeight: 500, fontSize: 12.5, fill: '#6e7682' }, c.share)\n        ]));\n      }\n    });\n    roles.forEach((r, i) => {\n      if (r.h >= 30) {\n        lbl.push(re('text', { key: 'rn' + i, x: r.tx, y: r.ny, dy: -2, textAnchor: 'start', fontFamily: FF, fontWeight: 600, fontSize: 15, fill: '#2c2c34' }, r.name));\n        lbl.push(re('text', { key: 'rc' + i, x: r.tx, y: r.ny, dy: 14, textAnchor: 'start', fontFamily: MONO, fontWeight: 500, fontSize: 12.5, fill: '#6e7682' }, r.count));\n      } else {\n        lbl.push(re('text', { key: 'rn' + i, x: r.tx, y: r.ny, dy: 5, textAnchor: 'start', fontFamily: FF, fontWeight: 600, fontSize: 15, fill: '#2c2c34' }, [\n          re('tspan', { key: 'a' }, r.name),\n          re('tspan', { key: 'b', dx: 9, fontFamily: MONO, fontWeight: 500, fontSize: 12.5, fill: '#6e7682' }, r.count)\n        ]));\n      }\n    });\n    const labels = re('g', { key: 'clbls' }, lbl);\n    return { C: { comps, roles, ribbons, labels } };\n  }\n\n  figD() {\n    const mk = (rgb, max, rows) => rows.map(r => ({\n      label: r[0],\n      cells: r.slice(1)
